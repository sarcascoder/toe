name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (core + full + dev; no mlx — that's Apple-Silicon only)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[full,dev]"

      - name: Self-check (zero-setup demo, no model needed)
        run: taul demo

      - name: Property tests (PORE metric correctness)
        run: python -m pytest tests/ -q

      - name: Build check (wheel + sdist are publishable)
        run: |
          pip install build twine
          python -m build
          python -m twine check dist/*
